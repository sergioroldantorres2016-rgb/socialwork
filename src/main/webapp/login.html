<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialWork — Iniciar sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">SocialWork</div>
            <h1>Iniciar sesión</h1>
            <div id="auth-error" class="auth-error"></div>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Iniciar sesión</button>
            </form>
            <div class="auth-link">
                ¿No tienes cuenta? <a href="register.html">Regístrate</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
