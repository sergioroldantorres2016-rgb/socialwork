<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialWork — Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">SocialWork</div>
            <h1>Crear cuenta</h1>
            <div id="auth-error" class="auth-error"></div>
            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: María García" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="rol">Rol profesional</label>
                    <input type="text" id="rol" name="rol" placeholder="Trabajador social" autocomplete="organization-title">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 4 caracteres" required minlength="4" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">Crear cuenta</button>
            </form>
            <div class="auth-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
